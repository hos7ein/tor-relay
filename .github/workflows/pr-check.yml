name: PR Check

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "torrc*"
      - "run.sh"

jobs:
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          ignore: ./.hadolint.yaml

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          no-cache: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: false # Do not push on PRs
          tags: ghcr.io/${{ github.repository_owner }}/tor-relay:pr-${{ github.event.number }}

  test:
    name: Test Docker image
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for test
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true # Load image into docker
          platforms: linux/amd64 # Build only for the runner architecture
          tags: ghcr.io/${{ github.repository_owner }}/tor-relay:pr-${{ github.event.number }}

      - name: Run container
        run: |
          docker run -d --name tor-relay-test -e RELAY_NICKNAME='Test' ghcr.io/${{ github.repository_owner }}/tor-relay:pr-${{ github.event.number }}
          echo "Waiting for container to start..."
          sleep 10
          echo "Container logs:"
          docker logs tor-relay-test
          echo "Checking tor version:"
          docker exec tor-relay-test tor --version
      - name: Cleanup container
        if: always()
        run: |
          docker stop tor-relay-test
          docker rm tor-relay-test